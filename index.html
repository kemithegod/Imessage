<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>send to goddess</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Syne:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0608;
      --accent: #ff6eb4;
      --accent2: #c2185b;
      --accent3: #ff8fcb;
      --text: #ffe8f2;
      --muted: #9a6a7e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,110,180,0.15) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.12); }
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 64px 48px;
      max-width: 440px;
      width: 90%;
      border: 1px solid rgba(255,110,180,0.15);
      background: rgba(13,6,8,0.75);
      backdrop-filter: blur(24px);
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 0.22em;
      color: var(--accent);
      text-transform: lowercase;
      margin-bottom: 22px;
      opacity: 0.85;
    }

    h1 {
      font-size: clamp(30px, 7vw, 42px);
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.1;
      margin-bottom: 18px;
    }

    h1 span {
      background: linear-gradient(120deg, var(--accent), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 17px;
      color: var(--muted);
      margin-bottom: 44px;
      line-height: 1.6;
    }

    .sub em {
      color: var(--accent3);
      font-style: normal;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      background: linear-gradient(135deg, #c2185b, #ff6eb4);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 18px 44px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 32px rgba(255,110,180,0.2);
    }

    .btn:hover {
      opacity: 0.92;
      transform: translateY(-2px);
      box-shadow: 0 0 48px rgba(255,110,180,0.38);
    }

    .btn:active { transform: translateY(0); }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 28px 0;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,110,180,0.12);
    }

    .btn-secondary {
      display: inline-block;
      text-decoration: none;
      border: 1px solid rgba(255,110,180,0.3);
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 16px 44px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      background: transparent;
    }

    .btn-secondary:hover {
      background: rgba(255,110,180,0.06);
      transform: translateY(-2px);
    }

    .note {
      margin-top: 28px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">@kemithegod</p>
    <h1>you can't<br/><span>help yourself</span></h1>
    <p class="sub">you've been on this page for how long now?<br/><em>i already know.</em> apple pay me.</p>

    <a class="btn" href="sms:kemisaidso@yahoo.com">yes goddess 💸</a>

    <div class="divider">or</div>

    <a class="btn-secondary" href="sms:kemisaidso@yahoo.com">humiliate yourself instead</a>

    <p class="note">
      opens imessage · apple pay built in<br/>
      resistance is cute though. keep trying.
    </p>
  </div>

  <script>
    const isApple = /iPhone|iPad|iPod|Macintosh/i.test(navigator.userAgent);
    if (isApple) {
      setTimeout(() => {
        window.location.href = 'sms:kemisaidso@yahoo.com';
      }, 1400);
    }
  </script>
</body>
</html>
